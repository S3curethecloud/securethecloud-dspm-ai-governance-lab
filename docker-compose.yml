services:
  dspm-api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      sh -c "pip install -r backend/requirements.txt &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8015"
    ports:
      - "8015:8015"
    environment:
      - DSPM_DATA_MODE=synthetic
