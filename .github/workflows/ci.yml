name: CI Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate synthetic DSPM lab
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest fastapi uvicorn pydantic

      - name: Validate repository contract
        run: python scripts/validate_repo.py

      - name: Run unit tests
        run: python -m pytest

      - name: Generate evidence artifacts
        run: python scripts/generate_evidence.py

      - name: Verify frontend data bundle
        run: |
          test -f frontend/data/executive_dashboard.json
          test -f frontend/data/evidence_manifest.json
          test -f frontend/data/ai_governance_companion_export_summary.json

      - name: Verify generated evidence outputs
        run: |
          test -f evidence/generated/executive_dashboard.json
          test -f evidence/generated/dashboard_summary.json
          test -f evidence/generated/ai_governance_companion_export_summary.json
          test -f evidence/generated/evidence_manifest.json
